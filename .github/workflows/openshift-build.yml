name: OpenShift Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  openshift-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o oc.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc kubectl /usr/local/bin/

      - name: Login to OpenShift
        run: |
          oc login "${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=true

      - name: Trigger OpenShift BuildConfig
        run: |
          oc start-build dotnet5-app \
            -n "${{ secrets.OPENSHIFT_NAMESPACE }}" \
            --follow \
            --wait

      - name: Show generated image
        run: |
          oc get istag dotnet5-app:latest \
            -n "${{ secrets.OPENSHIFT_NAMESPACE }}" \
            -o jsonpath='{.image.dockerImageReference}{"\n"}'
